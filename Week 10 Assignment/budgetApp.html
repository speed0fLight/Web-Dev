<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Penny Aqquisition</h1>
        <p>This company is dedicated to expanding the savings of all its users.</p>
    </header>
    <nav>
        <ul class="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a class="active" href="budgetApp.html">Budget App</a></li>
        </ul>
    </nav>
    <main>
        <h4 class="center">Budget Application v1</h4>

        <div id="appWindowContainer">
            <div id="appLeftWindow">
                <div><h2 class="center">Budget App</h2></div>
                
                <div>
                    <span class="inputBlock">
                        <label>Description: </label>
                        <input type="text" id="description">
                    </span>
                    <span class="inputBlock">
                        <label>Amount: </label>
                        <input type="number" id="amount">
                    </span>
                    <span id="itemButtons">
                        <button onclick="addIncome()">Add Income</button>
                        <button onclick="addExpense()">Add Expense</button>
                        <button onclick="clearInput()">Clear Input</button>
                        <button onclick="removeItem()">Remove</button>
                    </span>
                    
                </div>
            </div>

            <div id="appRightWindow">
                <h2 class="center">Summary</h2>
                <div class="center">
                    <table>
                        <tr>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th> </th>
                        </tr>
                        <tbody id="budgetItems"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <h2 class="center">Total Summary</h2>
        <div class="center">
            <table>
                <tr>
                    <th>Income</th>
                    <td id="totalIncome">0.00</td>
                </tr>
                <tr>
                    <th>Expenses</th>
                    <td id="totalExpenses">0.00</td>
                </tr>
                <tr>
                    <th>Remaining</th>
                    <td id="remainingBalance">0.00</td>
                </tr>
            </table>
        </div>

    </main>

    <footer>
        <div class="center"><h4>Penny Aqquisition &copy;</h4></div>
    </footer>
    <script src="javascript/budgetApp.js"></script>
</body>
</html>
